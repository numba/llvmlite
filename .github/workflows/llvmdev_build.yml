name: llvmdev-build

on:
  workflow_dispatch:

jobs:
  build-llvmdev:
    name: Build LLVMDEV on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            artifact-name: llvmdev-x86_64
            output-path: conda-bld/linux-64/*.tar.bz2
          - os: macos-14
            artifact-name: llvmdev-macos
            output-path: conda-bld/osx-64/*.tar.bz2
          - os: macos-13
            artifact-name: llvmdev-macos-x86_64
            output-path: conda-bld/osx-64/*.tar.bz2
          - os: windows-2022
            artifact-name: llvmdev-win64
            output-path: conda-bld/win-64/*.tar.bz2
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      - name: Install Miniconda
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            $wc = New-Object net.webclient
            $wc.Downloadfile("https://repo.anaconda.com/miniconda/Miniconda3-latest-Windows-x86_64.exe", "Miniconda3-latest-Windows-x86_64.exe")
            Start-Process "Miniconda3-latest-Windows-x86_64.exe" "/S /D=C:\Miniconda3" -Wait
            echo "C:\tools\miniconda3\Scripts" >> $GITHUB_PATH
          elif [ "$RUNNER_OS" == "macOS" ]; then
            curl -L https://repo.anaconda.com/miniconda/Miniconda3-latest-MacOSX-x86_64.sh -o miniconda.sh
            bash miniconda.sh -b -p $HOME/miniconda
            echo "$HOME/miniconda/bin" >> $GITHUB_PATH
          else
            curl -L https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -o miniconda.sh
            bash miniconda.sh -b -p $HOME/miniconda
            echo "$HOME/miniconda/bin" >> $GITHUB_PATH
          fi

      - name: Setup Conda Environment
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            # Windows activation
            source C:/tools/miniconda3/Scripts/activate
          else
            # Linux/macOS activation
            source $HOME/miniconda/bin/activate
          fi
          conda create -n builder conda-build -y

      - name: Build
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            # Windows activation
            source C:/tools/miniconda3/Scripts/activate
          else
            # Linux/macOS activation
            source $HOME/miniconda/bin/activate
          fi
          conda activate builder
          RECIPE_NAME=./conda-recipes/llvmdev_manylinux
          conda build $RECIPE_NAME
          echo "OUTPUT=$(conda build --output $RECIPE_NAME)" >> $GITHUB_ENV

      - name: Upload LLVMDEV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.output-path }}
          retention-days: 1
          if-no-files-found: error

