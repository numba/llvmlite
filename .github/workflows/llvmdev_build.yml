name: llvmdev-build

on:
  workflow_dispatch:

jobs:
  build-llvmdev:
    name: Build LLVMDEV on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            artifact-name: llvmdev-x86_64
            output-path: conda-bld/linux-64/*.tar.bz2
          - os: macos-14
            artifact-name: llvmdev-macos
            output-path: conda-bld/osx-64/*.tar.bz2
          - os: macos-13
            artifact-name: llvmdev-macos-x86_64
            output-path: conda-bld/osx-64/*.tar.bz2
          - os: windows-2022
            artifact-name: llvmdev-win64
            output-path: conda-bld/win-64/*.tar.bz2
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      
      # Install Miniconda on Windows
      - name: Install Miniconda (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $wc = New-Object net.webclient
          $wc.Downloadfile("https://repo.anaconda.com/miniconda/Miniconda3-latest-Windows-x86_64.exe", "Miniconda3-latest-Windows-x86_64.exe")
          Start-Process "Miniconda3-latest-Windows-x86_64.exe" "/S /D=C:\Miniconda3" -Wait

      # Install Miniconda on macOS
      - name: Install Miniconda (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L https://repo.anaconda.com/miniconda/Miniconda3-latest-MacOSX-x86_64.sh -o miniconda.sh
          bash miniconda.sh -b -p $HOME/miniconda
          echo "$HOME/miniconda/bin" >> $GITHUB_PATH
          source $HOME/miniconda/bin/activate

      # Install Miniconda on Linux
      - name: Install Miniconda (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -o miniconda.sh
          bash miniconda.sh -b -p $HOME/miniconda
          echo "$HOME/miniconda/bin" >> $GITHUB_PATH
          source $HOME/miniconda/bin/activate

      # Linux build
      - name: Build LLVMDEV (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          CONDA_NO_PLUGINS: "true"
          CONDA_SOLVER: "classic"
        run: |
          source $HOME/miniconda/bin/activate
          conda install -y conda-build ninja cmake
          conda build conda-recipes/llvmdev

      # macOS build
      - name: Build LLVMDEV (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          CONDA_NO_PLUGINS: "true"
          CONDA_SOLVER: "classic"
        run: |
          source $HOME/miniconda/bin/activate
          conda install -y conda-build ninja cmake
          conda build conda-recipes/llvmdev

      # Windows build
      - name: Build LLVMDEV (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          CONDA_NO_PLUGINS: "true"
          CONDA_SOLVER: "classic"
        run: |
          source /c/Miniconda3/Scripts/activate
          conda install -y conda-build ninja cmake
          conda build conda-recipes/llvmdev

      - name: Upload LLVMDEV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.output-path }}
          retention-days: 1
          if-no-files-found: error

